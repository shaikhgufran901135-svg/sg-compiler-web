<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Code Compiler - Practice & Demo Tool</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/material-darker.min.css"> 
  
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e8f5e9; color: #0b3d0b; }
    header { 
      background-color: #2e7d32; padding: 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      color: white; font-size: 24px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
    }
    header span { font-size: 24px; font-weight: bold; }
    .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .editor, .output { flex: 1 1 450px; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 300px; }
    h3 { margin-top: 0; color: #1b5e20; border-bottom: 2px solid #a5d6a7; padding-bottom: 10px; }
    
    .CodeMirror { height: 350px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; box-sizing: border-box; }
    .CodeMirror-scroll { max-height: 350px; overflow-y: auto; }
    .CodeMirror-lines { padding: 4px 0; }

    .controls { margin-top: 15px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; background: #f1f8e9; padding: 10px; border-radius: 5px; }
    button { background-color: #2e7d32; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; }
    button:hover { background-color: #1b5e20; }
    
    #darkModeToggle { background-color: #fdd835; color: #000; padding: 8px 15px; font-size: 14px; font-weight: bold; }
    #darkModeToggle:hover { background-color: #fbc02d; }
    #resetDefaultBtn { background-color: #fbc02d; }
    #resetDefaultBtn:hover { background-color: #f9a825; }
    #clearEditorBtn { background-color: #d32f2f; }
    #clearEditorBtn:hover { background-color: #b71c1c; }
    #copyOutputBtn { background-color: #0288d1; }
    #copyOutputBtn:hover { background-color: #01579b; }
    
    #languageSelector { padding: 8px; border-radius: 5px; border: 1px solid #ccc; background-color: #fff; font-size: 15px; cursor: pointer; }
    
    pre { background:#263238; color: #eceff1; padding:15px; border-radius:6px; height:350px; overflow:auto; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 14px; }
    .status-bar { margin-top: 10px; font-size: 14px; color: #555; }

    .dark-mode { background-color: #121212 !important; color: #e0e0e0 !important; }
    .dark-mode header { background-color: #004d40; color: #fff; }
    .dark-mode .editor, .dark-mode .output { background: #1e1e1e; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .dark-mode h3 { color: #80cbc4; border-bottom: 2px solid #004d40; }
    .dark-mode .controls { background: #212121; }
    .dark-mode button { background-color: #00695c; }
    .dark-mode button:hover { background-color: #00897b; }
    .dark-mode #darkModeToggle { background-color: #64dd17; color: #000; }
    .dark-mode #darkModeToggle:hover { background-color: #76ff03; }
  </style>
</head>
<body onload="initializeEditor()">
  <header>
    <span>SG Code Compiler (Practice Tool)</span>
    <button id="darkModeToggle" onclick="toggleDarkMode()">☀️ Light</button> 
  </header>

  <div class="container">
    <div class="editor">
      <h3>Write Your Code</h3>
      
      <select id="languageSelector" onchange="changeLanguage()">
        <option value="c">C</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp" data-locked="true">C++ 🔒</option>
        <option value="javascript" data-locked="true">JavaScript 🔒</option>
        <option value="php" data-locked="true">PHP 🔒</option>
        <option value="ruby" data-locked="true">Ruby 🔒</option>
        <option value="go" data-locked="true">Go 🔒</option>
      </select>
      
      <textarea id="code"></textarea>

      <div class="controls">
        <button onclick="runCode()">▶ Run Code</button>
        <button onclick="clearOutput()">Clear Output</button>
        <button id="resetDefaultBtn" onclick="resetDefaultCode()">🔄 Reset Default</button> 
        <button id="clearEditorBtn" onclick="clearEditor()">Clear Editor</button>
      </div>
      <p style="font-size:12px; color: #1b5e20; margin-top: 5px;">*Code is saved automatically in your browser.</p>
    </div>

    <div class="output">
      <h3>Output</h3>
      <pre id="outputBox">(Output will appear here)</pre>
      <button id="copyOutputBtn" onclick="copyOutput()">📋 Copy Output</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/clike/clike.min.js"></script> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script> 
  
  <script>
    let editor; 
    
    // Default Codes
    const defaultCodeC = `#include <stdio.h>\n\nint main() {\n    int num = 10;\n    printf("Hello from C compiler! The number is %d.\\n", num);\n    return 0;\n}`;
    const defaultCodePython = `# Python Example\nprint("Hello from Python!")\nprint("The actual compiler is working now.")`;
    const defaultCodeJava = `// Java Example\nclass Main {\n    public static void main(String[] args) {\n        System.out.println("Hello from Java!");\n    }\n}`;
    const defaultCodeCpp = `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello from Premium C++ Compiler!" << endl;\n    return 0;\n}`;
    const defaultCodeJS = `// JavaScript Example\nconsole.log("Hello from Premium JavaScript Compiler!");`;

    function toggleDarkMode() {
        const body = document.body;
        const toggleBtn = document.getElementById('darkModeToggle');
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
            toggleBtn.innerText = '🌙 Dark';
            localStorage.setItem('darkModeEnabled', 'true');
        } else {
            toggleBtn.innerText = '☀️ Light';
            localStorage.removeItem('darkModeEnabled');
        }
    }

    function initializeEditor() {
        if (localStorage.getItem('darkModeEnabled') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeToggle').innerText = '🌙 Dark';
        }
        
        // App se language unlock check karna
        if (typeof AndroidApp !== "undefined") {
            AndroidApp.checkLanguageStatus(); 
        }

        const lastLang = localStorage.getItem('selectedLanguage') || 'c';
        const savedCode = localStorage.getItem('sgCompilerCode');
        let initialMode = 'text/x-csrc';
        let initialCode = defaultCodeC;
        
        if (lastLang === 'python') {
            initialMode = 'text/x-python'; initialCode = defaultCodePython;
        } else if (lastLang === 'java') {
            initialMode = 'text/x-java'; initialCode = defaultCodeJava;
        }

        editor = CodeMirror.fromTextArea(document.getElementById('code'), {
            mode: initialMode, 
            theme: 'material-darker',     
            lineNumbers: true,    
            indentUnit: 4,        
            tabSize: 4,
            indentWithTabs: true,
            electricChars: true,
            matchBrackets: true,
            autoCloseBrackets: true,
        });

        editor.setValue(savedCode || initialCode); 
        editor.on('change', saveCode);
        document.getElementById('languageSelector').value = lastLang;
    }
    
    // --- NAYA SECRET BRIDGE CODE ---
    function changeLanguage() {
        const selector = document.getElementById('languageSelector');
        const lang = selector.value;
        const selectedOption = selector.options[selector.selectedIndex];
        
        // Check if locked
        if (selectedOption.getAttribute('data-locked') === 'true') {
            if (typeof AndroidApp !== "undefined") {
                // Android app ko ad dikhane ka message bhejo
                AndroidApp.showRewardedAd(lang);
            } else {
                // Agar PC ya browser me khola hai
                alert("This premium language can only be unlocked by watching a short video ad in the SG Code Compiler App. Download the app to unlock!");
            }
            // Code badalne se roko aur wapas C language par set kar do
            selector.value = 'c'; 
            return;
        }

        // Agar free hai toh normal load karo
        let mode = 'text/x-csrc';
        let newCode = defaultCodeC;
        
        if (lang === 'python') { mode = 'text/x-python'; newCode = defaultCodePython; } 
        else if (lang === 'java') { mode = 'text/x-java'; newCode = defaultCodeJava; }
        
        editor.setOption('mode', mode);
        editor.setValue(newCode); 
        localStorage.setItem('selectedLanguage', lang); 
    }

    // Android app idhar se unlock message bhejega
    function unlockLanguage(langId) {
        const selector = document.getElementById('languageSelector');
        for (let i = 0; i < selector.options.length; i++) {
            if (selector.options[i].value === langId) {
                let optionText = selector.options[i].text;
                selector.options[i].text = optionText.replace(' 🔒', ' 🔓');
                selector.options[i].removeAttribute('data-locked');
                break;
            }
        }
        alert("Language Unlocked! You can now use it.");
    }

    function saveCode() {
        const codeText = editor.getValue(); 
        localStorage.setItem('sgCompilerCode', codeText);
    }
    
    function resetDefaultCode() {
        const lang = document.getElementById('languageSelector').value;
        let defaultCodeToLoad = defaultCodeC;
        if (lang === 'python') defaultCodeToLoad = defaultCodePython;
        else if (lang === 'java') defaultCodeToLoad = defaultCodeJava;

        if (confirm(`Are you sure you want to reset the code to the default ${lang.toUpperCase()} example?`)) {
            editor.setValue(defaultCodeToLoad);
        }
    }

    function clearEditor() {
        if(confirm("Are you sure you want to clear all code in the editor?")) {
            editor.setValue(''); 
            localStorage.removeItem('sgCompilerCode'); 
        }
    }

    function copyOutput() {
        const outputText = document.getElementById('outputBox').innerText;
        navigator.clipboard.writeText(outputText).then(() => {
            alert('Output copied to clipboard!');
        }).catch(err => {
            console.error('Failed to copy text: ', err);
            alert('Could not copy output. Please try manually.');
        });
    }

    async function runCode() {
        const code = editor.getValue(); 
        const outputBox = document.getElementById('outputBox');
        const lang = document.getElementById('languageSelector').value; 
        
        outputBox.innerText = `Compiling & Running ${lang.toUpperCase()} on Server... Please wait.`;
        
        let languageId;
        if (lang === 'c') languageId = 50;
        else if (lang === 'python') languageId = 71; 
        else if (lang === 'java') languageId = 62;   

        try {
            const response = await fetch('https://compiler-backend-4dbz.onrender.com/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ language_id: languageId, source_code: code, stdin: "" })
            });

            const result = await response.json();

            if (result.error) {
                 outputBox.innerText = "Server Error:\n" + (result.message || "Something went wrong.");
                 return;
            }

            if (result.compile_output) {
                outputBox.innerText = "Compilation Error:\n" + result.compile_output;
            } else if (result.stderr) {
                outputBox.innerText = "Runtime Error:\n" + result.stderr;
            } else if (result.stdout !== null && result.stdout !== undefined) {
                outputBox.innerText = result.stdout || "Program executed successfully but returned no output.";
            } else if (result.status && result.status.description) {
                 outputBox.innerText = "Status:\n" + result.status.description;
            } else {
                outputBox.innerText = "Something went wrong. Please check console.";
                console.log(result);
            }

        } catch (error) {
            outputBox.innerText = `Network Error: Server is not reachable.\nDetails: ${error.message}`;
            console.error("Fetch Error:", error);
        }
    }

    function clearOutput() {
        document.getElementById('outputBox').innerText = "(Output cleared)";
    }
  </script>
</body>
</html>
